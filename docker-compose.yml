services:
  quark-database:
    image: postgres:17
    container_name: quark-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "tinyllama"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-api:
    build:
      context: .
      args:
        APP: mock-api
    container_name: mock-api
    network_mode: host
    env_file: .env

  lead-api:
    build:
      context: .
      args:
        APP: lead-api
    container_name: lead-api
    network_mode: host
    env_file: .env

  enrichment:
    build:
      context: .
      args:
        APP: enrichment
    container_name: enrichment-worker
    network_mode: host
    env_file: .env

volumes:
  postgres_data:
  ollama_data:
  rabbitmq_data:
